<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#020704"/>

  <!-- Border frame -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none" stroke="#003018" stroke-width="1"/>
  <!-- Corner accents -->
  <path d="M1.5 7 L1.5 1.5 L7 1.5" fill="none" stroke="#00783a" stroke-width="1"/>
  <path d="M25 1.5 L30.5 1.5 L30.5 7" fill="none" stroke="#00783a" stroke-width="1"/>
  <path d="M1.5 25 L1.5 30.5 L7 30.5" fill="none" stroke="#00783a" stroke-width="1"/>
  <path d="M25 30.5 L30.5 30.5 L30.5 25" fill="none" stroke="#00783a" stroke-width="1"/>

  <!-- Scanline overlay suggestion — subtle horizontal rules -->
  <line x1="1.5" y1="10" x2="30.5" y2="10" stroke="#001a05" stroke-width="0.5"/>
  <line x1="1.5" y1="22" x2="30.5" y2="22" stroke="#001a05" stroke-width="0.5"/>

  <!-- SG lettering -->
  <text
    x="16" y="21"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="15"
    font-weight="700"
    letter-spacing="1"
    fill="#00ff6a"
    filter="url(#glow)">SG</text>
</svg>
